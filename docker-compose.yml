version: "3.9"

services:
  api:
    build: .
    container_name: cardcheck-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Persist data so price updates survive container restarts
      - ./data/cardmarket/cards_with_prices.json:/app/data/cardmarket/cards_with_prices.json
      - ./data/cardmarket/price_guide.json:/app/data/cardmarket/price_guide.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 6G
