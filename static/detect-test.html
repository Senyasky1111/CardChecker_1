<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Detector Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f23; color: #e0e0e0; min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
  h1 { text-align: center; color: #ffcc00; font-size: 1.6rem; margin: 20px 0 8px; }
  .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 20px; }

  .upload-area {
    border: 2px dashed #444; border-radius: 16px; padding: 40px; text-align: center;
    margin: 20px 0; cursor: pointer; transition: border-color 0.3s; background: #1a1a2e;
  }
  .upload-area:hover { border-color: #ffcc00; }
  .upload-area.dragover { border-color: #ffcc00; background: #1a1a3e; }

  .btn {
    display: inline-block; padding: 12px 24px; border: none; border-radius: 8px;
    font-size: 1rem; cursor: pointer; margin: 8px; font-weight: 600;
    transition: transform 0.1s, opacity 0.2s;
  }
  .btn:hover { transform: scale(1.02); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: #ffcc00; color: #1a1a2e; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  #fileInput { display: none; }

  .spinner { display: none; text-align: center; margin: 20px 0; }
  .spinner.active { display: block; }
  .spinner::after {
    content: ''; display: inline-block; width: 32px; height: 32px;
    border: 3px solid #333; border-top-color: #ffcc00; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error { color: #ff4444; text-align: center; margin: 16px 0; }

  /* Results layout */
  .result-panel {
    display: none; margin-top: 24px;
  }
  .result-panel.visible { display: block; }

  .stats-bar {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .stat {
    background: #1a1a2e; border-radius: 12px; padding: 16px 24px; text-align: center;
    min-width: 120px;
  }
  .stat-label { color: #888; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
  .stat-value { font-size: 1.3rem; font-weight: bold; }
  .stat-value.found { color: #4caf50; }
  .stat-value.not-found { color: #ff4444; }
  .stat-value.method { color: #64b5f6; }
  .stat-value.confidence { color: #ffcc00; }
  .stat-value.time { color: #ce93d8; }

  .images-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;
  }
  @media (max-width: 700px) {
    .images-grid { grid-template-columns: 1fr; }
  }

  .image-card {
    background: #1a1a2e; border-radius: 16px; overflow: hidden;
  }
  .image-card-header {
    padding: 12px 16px; border-bottom: 1px solid #333;
    display: flex; justify-content: space-between; align-items: center;
  }
  .image-card-title { color: #ffcc00; font-weight: 600; font-size: 0.95rem; }
  .image-card-badge {
    padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;
  }
  .badge-original { background: #333; color: #aaa; }
  .badge-annotated { background: #1b5e20; color: #4caf50; }
  .badge-warped { background: #0d47a1; color: #42a5f5; }

  .image-card img {
    width: 100%; display: block; cursor: pointer;
    transition: transform 0.2s;
  }
  .image-card img:hover { transform: scale(1.02); }

  .corners-info {
    background: #111; border-radius: 12px; padding: 16px; margin-top: 20px;
    font-family: monospace; font-size: 0.85rem;
  }
  .corners-info h3 { color: #888; font-size: 0.85rem; margin-bottom: 8px; }
  .corner-row {
    display: flex; gap: 16px; margin: 4px 0;
  }
  .corner-label { color: #ffcc00; width: 90px; }
  .corner-val { color: #4caf50; }

  /* Fullscreen overlay for image zoom */
  .overlay {
    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.9); z-index: 1000; cursor: pointer;
    justify-content: center; align-items: center;
  }
  .overlay.visible { display: flex; }
  .overlay img { max-width: 95%; max-height: 95%; border-radius: 8px; }

  nav { text-align: center; margin-bottom: 12px; }
  nav a { color: #64b5f6; text-decoration: none; margin: 0 12px; font-size: 0.9rem; }
  nav a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <nav>
    <a href="/">&larr; Home</a>
    <a href="/scan">Scan v1</a>
    <a href="/scan_2">Scan v2</a>
  </nav>

  <h1>Card Detector Test</h1>
  <p class="subtitle">Upload a photo to see how the card detection & perspective correction works</p>

  <div class="upload-area" id="dropZone">
    <p style="font-size: 1.1rem; margin-bottom: 16px;">Drop a card photo here or click to upload</p>
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">Upload Photo</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>

  <div style="text-align: center;">
    <button class="btn btn-primary" id="detectBtn" onclick="runDetect()" disabled>Detect Card</button>
  </div>

  <div class="spinner" id="spinner"></div>
  <div class="error" id="error"></div>

  <div class="result-panel" id="resultPanel">
    <div class="stats-bar" id="statsBar"></div>

    <div class="images-grid" id="imagesGrid"></div>

    <div class="corners-info" id="cornersInfo"></div>
  </div>
</div>

<!-- Fullscreen image overlay -->
<div class="overlay" id="overlay" onclick="closeOverlay()">
  <img id="overlayImg" alt="Fullscreen view">
</div>

<script>
const API = window.location.origin;
let selectedFile = null;
let previewUrl = null;

document.getElementById('fileInput').addEventListener('change', (e) => {
  if (e.target.files.length > 0) handleFile(e.target.files[0]);
});

const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  selectedFile = file;
  if (previewUrl) URL.revokeObjectURL(previewUrl);
  previewUrl = URL.createObjectURL(file);
  document.getElementById('detectBtn').disabled = false;
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('error').textContent = '';
}

async function runDetect() {
  if (!selectedFile) return;

  const btn = document.getElementById('detectBtn');
  const spinner = document.getElementById('spinner');
  const errorEl = document.getElementById('error');
  const resultPanel = document.getElementById('resultPanel');

  btn.disabled = true;
  spinner.classList.add('active');
  errorEl.textContent = '';
  resultPanel.classList.remove('visible');

  try {
    const formData = new FormData();
    formData.append('file', selectedFile);

    const t0 = performance.now();
    const resp = await fetch(`${API}/detect-card?visualize=true`, {
      method: 'POST', body: formData,
    });
    const totalMs = performance.now() - t0;
    if (!resp.ok) {
      const errText = await resp.text();
      throw new Error(`Server error (${resp.status}): ${errText.substring(0, 200)}`);
    }
    const data = await resp.json();

    // Stats bar
    const statsBar = document.getElementById('statsBar');
    statsBar.innerHTML = `
      <div class="stat">
        <div class="stat-label">Card Found</div>
        <div class="stat-value ${data.card_found ? 'found' : 'not-found'}">
          ${data.card_found ? 'YES' : 'NO'}
        </div>
      </div>
      <div class="stat">
        <div class="stat-label">Method</div>
        <div class="stat-value method">${data.method}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Confidence</div>
        <div class="stat-value confidence">${(data.confidence * 100).toFixed(1)}%</div>
      </div>
      <div class="stat">
        <div class="stat-label">Server Time</div>
        <div class="stat-value time">${data.processing_time_ms.toFixed(0)}ms</div>
      </div>
      <div class="stat">
        <div class="stat-label">Total Time</div>
        <div class="stat-value time">${totalMs.toFixed(0)}ms</div>
      </div>
    `;

    // Images grid
    const grid = document.getElementById('imagesGrid');
    let html = '';

    // Original image
    html += `
      <div class="image-card">
        <div class="image-card-header">
          <span class="image-card-title">Original Photo</span>
          <span class="image-card-badge badge-original">INPUT</span>
        </div>
        <img src="${previewUrl}" alt="Original" onclick="openOverlay(this.src)">
      </div>
    `;

    // Annotated image (with detected quad drawn)
    if (data.annotated_url) {
      html += `
        <div class="image-card">
          <div class="image-card-header">
            <span class="image-card-title">Detected Card</span>
            <span class="image-card-badge badge-annotated">DETECTED</span>
          </div>
          <img src="${data.annotated_url}?t=${Date.now()}" alt="Annotated" onclick="openOverlay(this.src)">
        </div>
      `;
    }

    // Warped card image
    if (data.warped_url) {
      html += `
        <div class="image-card">
          <div class="image-card-header">
            <span class="image-card-title">Corrected Card (600x825)</span>
            <span class="image-card-badge badge-warped">WARPED</span>
          </div>
          <img src="${data.warped_url}?t=${Date.now()}" alt="Warped card" onclick="openOverlay(this.src)" style="max-height: 500px; width: auto; margin: 0 auto;">
        </div>
      `;
    }

    grid.innerHTML = html;

    // Corners info
    const cornersInfo = document.getElementById('cornersInfo');
    const labels = ['Top-Left', 'Top-Right', 'Bottom-Right', 'Bottom-Left'];
    let cornersHtml = '<h3>Detected Corners (px)</h3>';
    if (data.corners && data.corners.length === 4) {
      for (let i = 0; i < 4; i++) {
        cornersHtml += `
          <div class="corner-row">
            <span class="corner-label">${labels[i]}</span>
            <span class="corner-val">(${data.corners[i][0].toFixed(1)}, ${data.corners[i][1].toFixed(1)})</span>
          </div>
        `;
      }
    }
    cornersInfo.innerHTML = cornersHtml;

    resultPanel.classList.add('visible');

  } catch (err) {
    errorEl.textContent = `Error: ${err.message}`;
  } finally {
    btn.disabled = false;
    spinner.classList.remove('active');
  }
}

function openOverlay(src) {
  document.getElementById('overlayImg').src = src;
  document.getElementById('overlay').classList.add('visible');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('visible');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeOverlay();
});
</script>
</body>
</html>
